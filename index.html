<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>INNOCENT TECH • DEFENCE CALCULATOR | Scientific Power</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, sans-serif;
            position: relative;
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #010101);
        }

        /* ========= DEFENCE TECH THEME ========= */
        :root {
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.6);
            --green: #2e8b57;
            --green-bright: #3cb371;
            --yellow: #ffd966;
            --blue-electric: #3b82f6;
            --dark-bg: #03060e;
        }

        /* animated background hexagon pattern */
        .defence-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .defence-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.04) 0px, rgba(212, 175, 55, 0.04) 2px, transparent 2px, transparent 12px),
                        repeating-linear-gradient(135deg, rgba(59, 179, 113, 0.03) 0px, rgba(59, 179, 113, 0.03) 1px, transparent 1px, transparent 10px);
        }
        .hex-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.12"><path fill="none" stroke="%23d4af37" stroke-width="0.6" d="M50,5 L85,20 L85,50 L50,65 L15,50 L15,20 L50,5 Z M50,35 L85,50 L85,80 L50,95 L15,80 L15,50 L50,35 Z"/></svg>');
            background-size: 58px 58px;
            pointer-events: none;
        }

        /* TOP BAR: WhatsApp link + rotating globe */
        .top-defence-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: rgba(3, 6, 14, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--gold);
            flex-wrap: wrap;
            gap: 12px;
        }
        .whatsapp-link {
            background: linear-gradient(135deg, #25D366, #128C7E);
            padding: 8px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
            box-shadow: 0 0 12px rgba(37, 211, 102, 0.4);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .whatsapp-link:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #2cd76e, #0f9d6b);
            box-shadow: 0 0 18px rgba(37, 211, 102, 0.6);
        }
        .rotating-globe {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 18px;
            border-radius: 60px;
            border: 1px solid var(--gold);
        }
        .globe-spin {
            animation: spinSlow 5s infinite linear;
            font-size: 1.6rem;
            color: var(--gold);
        }
        @keyframes spinSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .innocent-badge {
            font-weight: 800;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--yellow), var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        /* FULLSCREEN CALCULATOR */
        .calc-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 1.2rem 1.2rem 1.2rem;
            z-index: 20;
        }
        .calculator-card {
            width: 100%;
            max-width: 780px;
            background: rgba(5, 10, 22, 0.82);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(212, 175, 55, 0.7);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(60, 179, 113, 0.3);
            transition: all 0.2s;
        }

        /* display */
        .display-area {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid var(--gold);
            border-right: 1px solid var(--green-bright);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(212,175,55,0.2);
        }
        .expression {
            font-size: 1rem;
            color: #bbd4ff;
            min-height: 2rem;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        .result {
            font-size: 2.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffdf8c, var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: right;
            font-family: 'Courier New', monospace;
            word-break: break-word;
            line-height: 1.2;
            margin-top: 5px;
        }
        .scientific-badge {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.7rem;
            color: var(--yellow);
            border-top: 1px dashed rgba(212, 175, 55, 0.5);
            padding-top: 8px;
        }

        /* BUTTON GRID - ENLARGED & BOLD */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }
        button {
            background: rgba(16, 26, 46, 0.9);
            border: none;
            padding: 1rem 0;
            border-radius: 1.2rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #f0f3ff;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            border-bottom: 3px solid var(--green);
            font-family: 'Inter', monospace;
            letter-spacing: 0.5px;
        }
        button:hover {
            transform: translateY(-3px);
            background: rgba(212, 175, 55, 0.3);
            border-bottom-color: var(--gold);
            box-shadow: 0 6px 14px rgba(212, 175, 55, 0.3);
        }
        button:active {
            transform: translateY(1px);
        }
        .operator-btn {
            background: rgba(46, 139, 87, 0.45);
            color: #fff0c0;
            border-bottom-color: var(--gold);
            font-weight: 800;
        }
        .equal-btn {
            background: linear-gradient(135deg, var(--gold), #b57c1c);
            color: #0a0c1a;
            font-weight: 900;
            border-bottom: 3px solid var(--yellow);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
        }
        .clear-btn {
            background: rgba(180, 70, 50, 0.85);
            border-bottom-color: #ffaa66;
        }
        .func-btn {
            background: rgba(30, 64, 125, 0.8);
            border-bottom-color: var(--blue-electric);
            font-size: 0.95rem;
        }
        .span-2 {
            grid-column: span 2;
        }
        @media (max-width: 620px) {
            .calculator-card { padding: 1rem; }
            .buttons-grid { gap: 8px; }
            button { padding: 0.7rem 0; font-size: 0.85rem; }
            .result { font-size: 2rem; }
            .top-defence-bar { padding: 8px 16px; }
            .whatsapp-link { padding: 5px 14px; font-size: 0.75rem; }
            .innocent-badge { font-size: 0.8rem; }
        }
        .info-footer {
            margin-top: 1.2rem;
            text-align: center;
            font-size: 0.65rem;
            color: #8aa3cc;
            display: flex;
            justify-content: center;
            gap: 1rem;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 12px;
        }
    </style>
</head>
<body>

<!-- DEFENCE TECH BACKGROUND -->
<div class="defence-bg">
    <div class="hex-grid"></div>
</div>

<!-- TOP BAR: WhatsApp link + rotating globe + INNOCENT TECH -->
<div class="top-defence-bar">
    <a href="https://wa.me/254751833703?text=Hello%20Innocent%20Tech%20-%20I%20need%20assistance%20with%20calculator%20or%20tech%20support" 
       class="whatsapp-link" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-whatsapp" style="font-size: 1.2rem;"></i>
        <span>WHATSAPP: 0751833703</span>
        <i class="fas fa-arrow-right"></i>
    </a>
    <div class="rotating-globe">
        <i class="fas fa-globe-africa globe-spin"></i>
        <span class="innocent-badge">⚡ INNOCENT TECH ⚡</span>
    </div>
</div>

<!-- MAIN CALCULATOR - ENLARGED BUTTONS, FULL SCIENTIFIC -->
<div class="calc-container">
    <div class="calculator-card">
        <div class="display-area">
            <div class="expression" id="expressionPreview">0</div>
            <div class="result" id="resultDisplay">0</div>
            <div class="scientific-badge">
                <span><i class="fas fa-microchip"></i> DEFENCE SCIENTIFIC | rad/deg</span>
                <span><i class="fas fa-chart-line"></i> π, e, ln, log, xʸ, √</span>
            </div>
        </div>

        <div class="buttons-grid" id="calcGrid">
            <button class="func-btn" data-action="rad">rad</button>
            <button class="func-btn" data-action="deg">deg</button>
            <button class="func-btn" data-func="sin">sin</button>
            <button class="func-btn" data-func="cos">cos</button>
            <button class="func-btn" data-func="tan">tan</button>
            <button class="func-btn" data-func="ln">ln</button>

            <button class="func-btn" data-func="log">log</button>
            <button class="func-btn" data-func="√">√</button>
            <button class="func-btn" data-func="x²">x²</button>
            <button class="func-btn" data-func="xʸ">xʸ</button>
            <button class="func-btn" data-const="π">π</button>
            <button class="func-btn" data-const="e">e</button>

            <button data-input="7">7</button>
            <button data-input="8">8</button>
            <button data-input="9">9</button>
            <button class="operator-btn" data-op="/">÷</button>
            <button class="func-btn" data-func="(">(</button>
            <button class="func-btn" data-func=")">)</button>

            <button data-input="4">4</button>
            <button data-input="5">5</button>
            <button data-input="6">6</button>
            <button class="operator-btn" data-op="*">×</button>
            <button class="func-btn" data-func="abs">|x|</button>
            <button class="func-btn" data-func="floor">floor</button>

            <button data-input="1">1</button>
            <button data-input="2">2</button>
            <button data-input="3">3</button>
            <button class="operator-btn" data-op="-">-</button>
            <button class="func-btn" data-func="ceil">ceil</button>
            <button class="func-btn" data-func="%">%</button>

            <button data-input="0">0</button>
            <button data-input=".">.</button>
            <button class="clear-btn" data-action="clear">C</button>
            <button class="operator-btn" data-op="+">+</button>
            <button class="func-btn" data-func="exp">eˣ</button>
            <button class="func-btn" data-func="x³">x³</button>

            <button class="func-btn" data-func="1/x">1/x</button>
            <button class="func-btn" data-func="!">n!</button>
            <button class="func-btn" data-action="backspace"><i class="fas fa-backspace"></i></button>
            <button class="equal-btn span-2" data-action="equals">=</button>
            <button class="func-btn" data-func="±">+/-</button>
        </div>
        <div class="info-footer">
            <span><i class="fas fa-calculator"></i> TACTICAL PRECISION</span>
            <span><i class="fas fa-shield-alt"></i> INNOCENT TECH DEFENCE</span>
            <span><i class="fas fa-phone-alt"></i> CONTACT WHATSAPP</span>
        </div>
    </div>
</div>

<script>
    // ========= FULL SCIENTIFIC CALCULATOR ENGINE ==========
    let currentExpression = "";
    let radianMode = true;
    let lastResult = null;
    const expressionDiv = document.getElementById("expressionPreview");
    const resultDiv = document.getElementById("resultDisplay");

    function updateDisplay() {
        expressionDiv.innerText = currentExpression === "" ? "0" : currentExpression;
    }
    function setResult(value) {
        if (value === undefined || isNaN(value) || !isFinite(value)) {
            resultDiv.innerText = "⚡ ERROR";
            return;
        }
        let num = parseFloat(value);
        if (isNaN(num)) { resultDiv.innerText = "INVALID"; return; }
        if (Math.abs(num) > 1e12 || (Math.abs(num) < 1e-12 && num !== 0)) {
            resultDiv.innerText = num.toExponential(10);
        } else {
            let str = num.toString();
            if (str.includes('.') && str.replace(/\.?0+$/, '').length < 15) {
                resultDiv.innerText = parseFloat(num.toFixed(10)).toString();
            } else { resultDiv.innerText = str; }
        }
        lastResult = num;
    }

    function evaluateExpression(expr) {
        let processed = expr.trim();
        if (processed === "") return 0;
        processed = processed.replace(/π/g, 'PI').replace(/e(?![a-z])/g, 'E');
        processed = processed.replace(/(\d+(?:\.\d+)?|\([^()]+\)|π|E)!/g, (match, numStr) => {
            let num = evaluateSimpleNumber(numStr);
            return isNaN(num) ? 'NaN' : factorial(num);
        });
        processed = processed.replace(/(\d+(?:\.\d+)?)%/g, (match, p) => `(${p}/100)`);
        processed = processed.replace(/√\(([^)]+)\)/g, 'sqrt($1)').replace(/√(\d+(?:\.\d+)?)/g, 'sqrt($1)');
        processed = processed.replace(/x²/g, '^2').replace(/x³/g, '^3').replace(/\^/g, '**');
        processed = processed.replace(/1\/x/g, '(1/x)').replace(/\|x\|/g, 'abs(x)');
        processed = processed.replace(/floor\(/g, 'Math.floor(').replace(/ceil\(/g, 'Math.ceil(').replace(/abs\(/g, 'Math.abs(');
        processed = processed.replace(/ln\(/g, 'Math.log(').replace(/log\(/g, 'log10(').replace(/exp\(/g, 'Math.exp(');
        processed = processed.replace(/sin\(/g, 'sinFunc(').replace(/cos\(/g, 'cosFunc(').replace(/tan\(/g, 'tanFunc(').replace(/sqrt\(/g, 'Math.sqrt(');
        
        function sinFunc(x) { let val = radianMode ? x : x * Math.PI/180; return Math.sin(val); }
        function cosFunc(x) { let val = radianMode ? x : x * Math.PI/180; return Math.cos(val); }
        function tanFunc(x) { let val = radianMode ? x : x * Math.PI/180; return Math.tan(val); }
        function log10(x) { return Math.log10(x); }
        function factorial(n) { if (n < 0 || Math.floor(n) !== n) return NaN; if (n > 170) return Infinity; let f=1; for(let i=2;i<=n;i++) f*=i; return f; }
        function evaluateSimpleNumber(strExpr) { try { const fn = new Function('return (' + strExpr + ')'); return fn(); } catch(e){ return NaN; } }
        try {
            const evaluator = new Function('sinFunc','cosFunc','tanFunc','log10','factorial','Math', `"use strict"; return (${processed});`);
            let res = evaluator(sinFunc, cosFunc, tanFunc, log10, factorial, Math);
            if (isNaN(res) || !isFinite(res)) throw new Error();
            return res;
        } catch(err) { return NaN; }
    }
    function computeFactorial(num) { if (num < 0 || Math.floor(num) !== num) return NaN; if (num>170) return Infinity; let f=1; for(let i=2;i<=num;i++) f*=i; return f; }
    function applyUnaryFunction(funcName) {
        let currentValue = currentExpression.trim() === "" ? (lastResult !== null ? lastResult : 0) : evaluateExpression(currentExpression);
        if (isNaN(currentValue)) { setResult(NaN); return; }
        let computed;
        switch(funcName){
            case 'sin': computed = radianMode ? Math.sin(currentValue) : Math.sin(currentValue*Math.PI/180); break;
            case 'cos': computed = radianMode ? Math.cos(currentValue) : Math.cos(currentValue*Math.PI/180); break;
            case 'tan': computed = radianMode ? Math.tan(currentValue) : Math.tan(currentValue*Math.PI/180); break;
            case 'ln': computed = Math.log(currentValue); break;
            case 'log': computed = Math.log10(currentValue); break;
            case '√': computed = Math.sqrt(currentValue); break;
            case 'x²': computed = currentValue**2; break;
            case 'x³': computed = currentValue**3; break;
            case 'exp': computed = Math.exp(currentValue); break;
            case 'abs': computed = Math.abs(currentValue); break;
            case 'floor': computed = Math.floor(currentValue); break;
            case 'ceil': computed = Math.ceil(currentValue); break;
            case '1/x': computed = 1/currentValue; break;
            case '!': computed = computeFactorial(Math.floor(currentValue)); break;
            case '±': computed = -currentValue; break;
            default: return;
        }
        if (isNaN(computed) || !isFinite(computed)) { setResult(NaN); resultDiv.innerText = "MATH ERROR"; currentExpression=""; updateDisplay(); return; }
        setResult(computed);
        currentExpression = computed.toString();
        updateDisplay();
        lastResult = computed;
    }
    function handlePower() {
        let baseVal = currentExpression.trim() === "" ? (lastResult !== null ? lastResult : 0) : evaluateExpression(currentExpression);
        if (isNaN(baseVal)) { setResult(NaN); return; }
        let exponent = prompt("🔢 ENTER EXPONENT (y):", "2");
        if(exponent===null) return;
        let expNum = parseFloat(exponent);
        if(isNaN(expNum)) return;
        let result = Math.pow(baseVal, expNum);
        setResult(result);
        currentExpression = result.toString();
        updateDisplay();
        lastResult = result;
    }
    function handleButtonClick(value, type, action, func, op, constVal){
        if(action==='clear'){ currentExpression=""; lastResult=null; setResult(0); updateDisplay(); resultDiv.innerText="0"; return; }
        if(action==='equals'){
            if(currentExpression===""){ if(lastResult!==null) setResult(lastResult); return; }
            let evalResult = evaluateExpression(currentExpression);
            if(isNaN(evalResult) || !isFinite(evalResult)){ setResult(NaN); resultDiv.innerText="❌ INVALID"; currentExpression=""; updateDisplay(); return; }
            setResult(evalResult); currentExpression = evalResult.toString(); updateDisplay(); lastResult = evalResult; return;
        }
        if(action==='backspace'){ currentExpression = currentExpression.slice(0,-1); updateDisplay(); if(currentExpression==="") setResult(0); else { let prev = evaluateExpression(currentExpression); if(!isNaN(prev) && isFinite(prev)) setResult(prev); else resultDiv.innerText="?"; } return; }
        if(func){ if(func==='xʸ'){ handlePower(); return; } applyUnaryFunction(func); return; }
        if(op){ currentExpression += op; updateDisplay(); return; }
        if(constVal){ currentExpression += constVal; updateDisplay(); return; }
        if(type==='input'){ currentExpression += value; updateDisplay(); return; }
        if(type==='rad'){ radianMode=true; resultDiv.innerText = lastResult!==null?lastResult:"0"; return; }
        if(type==='deg'){ radianMode=false; resultDiv.innerText = lastResult!==null?lastResult:"0"; return; }
    }
    const btns = document.querySelectorAll('#calcGrid button');
    btns.forEach(btn => {
        btn.addEventListener('click',(e)=>{
            e.preventDefault();
            const inputVal=btn.getAttribute('data-input'), opVal=btn.getAttribute('data-op'), actionVal=btn.getAttribute('data-action'), funcVal=btn.getAttribute('data-func'), constVal=btn.getAttribute('data-const');
            if(inputVal!==null) handleButtonClick(inputVal,'input',null,null,null,null);
            else if(opVal!==null) handleButtonClick(null,null,null,null,opVal,null);
            else if(actionVal!==null) handleButtonClick(null,null,actionVal,null,null,null);
            else if(funcVal!==null) handleButtonClick(null,null,null,funcVal,null,null);
            else if(constVal!==null) handleButtonClick(null,null,null,null,null,constVal);
            else if(btn.getAttribute('data-action')==='rad'){ radianMode=true; resultDiv.innerText=lastResult!==null?lastResult:"0"; }
            else if(btn.getAttribute('data-action')==='deg'){ radianMode=false; resultDiv.innerText=lastResult!==null?lastResult:"0"; }
        });
    });
    setResult(0); currentExpression=""; updateDisplay();

    // ========= VOICE GREETING (Lady voice: WELCOME TO INNOCENT TECH CALCULATION) ==========
    let greetingPlayed = false;
    function playWelcomeVoice() {
        if (greetingPlayed) return;
        try {
            const utterance = new SpeechSynthesisUtterance("WELCOME TO INNOCENT TECH CALCULATION. FOR ANY HELP CONTACT US ON WHATSAPP 0751833703.");
            utterance.lang = "en-US";
            utterance.rate = 0.92;
            utterance.pitch = 1.1;
            // Select a female voice if available
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(voice => voice.name.includes("Google UK English Female") || voice.name.includes("Samantha") || voice.name.includes("Karen"));
            if (femaleVoice) utterance.voice = femaleVoice;
            window.speechSynthesis.cancel(); // cancel any pending
            window.speechSynthesis.speak(utterance);
            greetingPlayed = true;
        } catch(e) { console.warn("voice not supported"); }
    }

    // trigger voice after user first interaction (tap anywhere or calculator use)
    let voiceTriggered = false;
    function triggerVoiceOnce() {
        if (!voiceTriggered) {
            playWelcomeVoice();
            voiceTriggered = true;
        }
    }
    // listen to first click on calculator or body
    document.body.addEventListener('click', () => { triggerVoiceOnce(); }, { once: true });
    document.querySelector('.calculator-card').addEventListener('click', () => { triggerVoiceOnce(); }, { once: true });
    
    // also load voices async
    window.speechSynthesis.onvoiceschanged = () => {
        if (!voiceTriggered) {
            // optional: no auto, wait for click
        }
    };
    // small fallback: show that voice is ready
</script>
</body>
</html>
