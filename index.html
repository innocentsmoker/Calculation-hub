<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DEFENCE TECH CALCULATOR | INNOCENT TECH</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, sans-serif;
            position: relative;
            background: radial-gradient(circle at 20% 30%, #0a1428, #020408);
        }

        /* ========= DEFENCE COLOR THEME: Gold, Green, Yellow, Blue ========= */
        :root {
            --defence-gold: #d4af37;
            --defence-gold-glow: rgba(212, 175, 55, 0.5);
            --defence-green: #2e8b57;
            --defence-green-bright: #3cb371;
            --defence-yellow: #ffd700;
            --defence-blue: #1e3a8a;
            --defence-blue-electric: #3b82f6;
            --defence-dark: #0a0f1c;
        }

        /* TECH AUDIO VISUALIZER + DYNAMIC BACKGROUND */
        .audio-visualizer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 200;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--defence-gold);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: 0.2s;
        }
        .audio-visualizer:hover {
            transform: scale(1.02);
            border-color: var(--defence-yellow);
        }
        .audio-btn {
            background: var(--defence-gold);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #0a0f1c;
            font-size: 14px;
            transition: 0.2s;
        }
        .audio-btn:hover {
            background: var(--defence-yellow);
            transform: scale(1.05);
        }
        .audio-status {
            font-size: 0.7rem;
            color: var(--defence-yellow);
            font-family: monospace;
            letter-spacing: 1px;
        }
        .wave-bars {
            display: flex;
            gap: 3px;
            align-items: center;
            height: 24px;
        }
        .wave-bars span {
            width: 3px;
            height: 8px;
            background: var(--defence-gold);
            border-radius: 2px;
            animation: waveAnim 0.8s infinite ease alternate;
        }
        @keyframes waveAnim {
            0% { height: 4px; opacity: 0.4; }
            100% { height: 18px; opacity: 1; background: var(--defence-yellow); }
        }

        /* Defence Tech animated background overlay */
        .defence-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .defence-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.03) 0px, rgba(212, 175, 55, 0.03) 2px, transparent 2px, transparent 12px),
                        repeating-linear-gradient(135deg, rgba(59, 179, 113, 0.03) 0px, rgba(59, 179, 113, 0.03) 1px, transparent 1px, transparent 10px);
        }
        /* Camo-tech hexagons */
        .hex-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path fill="none" stroke="%23d4af37" stroke-width="0.5" d="M50,5 L85,20 L85,50 L50,65 L15,50 L15,20 L50,5 Z M50,35 L85,50 L85,80 L50,95 L15,80 L15,50 L50,35 Z"/></svg>');
            background-size: 55px 55px;
            pointer-events: none;
            opacity: 0.25;
        }
        /* INNOCENT TECH bold defence style */
        .brand-defence {
            position: fixed;
            top: 20px;
            right: 25px;
            z-index: 100;
            font-family: 'Poppins', monospace;
            font-weight: 800;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--defence-gold), var(--defence-yellow));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            pointer-events: none;
        }
        .brand-defence i {
            color: var(--defence-gold);
            margin-right: 5px;
        }

        /* FULLSCREEN CALCULATOR CONTAINER - FITS SCREEN PERFECTLY */
        .calc-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: none;
            background: rgba(8, 14, 26, 0.65);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.2rem;
            z-index: 20;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }

        /* inner calculator card - responsive & fits any screen */
        .calculator-card {
            width: 100%;
            max-width: 680px;
            background: rgba(2, 6, 18, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(212, 175, 55, 0.6);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(59, 179, 113, 0.2);
            transition: all 0.2s;
        }

        /* display area with defence gradient */
        .display-area {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--defence-gold);
            border-right: 1px solid var(--defence-green-bright);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(212, 175, 55, 0.2);
        }
        .expression {
            font-size: 1rem;
            color: #aac8ff;
            min-height: 2rem;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        .result {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, var(--defence-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: right;
            font-family: 'Courier New', monospace;
            word-break: break-word;
            line-height: 1.2;
            margin-top: 5px;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }
        .scientific-badge {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.7rem;
            color: var(--defence-yellow);
            border-top: 1px dashed rgba(212, 175, 55, 0.5);
            padding-top: 8px;
        }

        /* BUTTON GRID - enhanced defence colours */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }
        button {
            background: rgba(20, 30, 50, 0.85);
            border: none;
            padding: 0.9rem 0;
            border-radius: 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #eef5ff;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            border-bottom: 2px solid var(--defence-green);
            font-family: 'Inter', monospace;
        }
        button:hover {
            transform: translateY(-3px);
            background: rgba(212, 175, 55, 0.3);
            border-bottom-color: var(--defence-gold);
            box-shadow: 0 5px 12px rgba(212, 175, 55, 0.2);
        }
        button:active {
            transform: translateY(1px);
        }
        .operator-btn {
            background: rgba(46, 139, 87, 0.35);
            color: #ffecb3;
            border-bottom-color: var(--defence-gold);
            font-weight: 800;
        }
        .equal-btn {
            background: linear-gradient(135deg, var(--defence-gold), #b8860b);
            color: #0a0c1a;
            font-weight: 900;
            border-bottom: 2px solid var(--defence-yellow);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        .clear-btn {
            background: rgba(180, 70, 50, 0.8);
            border-bottom-color: #ffaa66;
        }
        .func-btn {
            background: rgba(30, 58, 138, 0.7);
            border-bottom-color: var(--defence-blue-electric);
            font-size: 0.85rem;
        }
        .span-2 {
            grid-column: span 2;
        }
        @media (max-width: 600px) {
            .calculator-card {
                padding: 1rem;
            }
            .buttons-grid {
                gap: 7px;
            }
            button {
                padding: 0.7rem 0;
                font-size: 0.8rem;
            }
            .result {
                font-size: 1.9rem;
            }
            .brand-defence {
                font-size: 0.9rem;
                top: 10px;
                right: 12px;
            }
        }
        .info-footer {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.6rem;
            color: #7f9fcf;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 12px;
        }
    </style>
</head>
<body>

<!-- DEFENCE THEME BACKGROUND + INNOCENT TECH STYLISH -->
<div class="defence-bg">
    <div class="hex-pattern"></div>
</div>
<div class="brand-defence">
    <i class="fas fa-shield-alt"></i> INNOCENT TECH • DEFENCE DIVISION
</div>

<!-- AUDIO TECH SECTION -->
<div class="audio-visualizer" id="audioControl">
    <div class="wave-bars" id="waveBars">
        <span style="animation-delay: 0s"></span>
        <span style="animation-delay: 0.2s"></span>
        <span style="animation-delay: 0.4s"></span>
        <span style="animation-delay: 0.1s"></span>
        <span style="animation-delay: 0.3s"></span>
    </div>
    <button class="audio-btn" id="toggleAudioBtn">
        <i class="fas fa-play"></i>
    </button>
    <span class="audio-status" id="audioStatusText">TECH AUDIO OFF</span>
</div>

<div class="calc-container">
    <div class="calculator-card">
        <div class="display-area">
            <div class="expression" id="expressionPreview">0</div>
            <div class="result" id="resultDisplay">0</div>
            <div class="scientific-badge">
                <span><i class="fas fa-microchip"></i> DEFENCE MODE | rad/deg</span>
                <span><i class="fas fa-chart-line"></i> π, e, ln, log, xʸ</span>
            </div>
        </div>

        <div class="buttons-grid" id="calcGrid">
            <button class="func-btn" data-action="rad">rad</button>
            <button class="func-btn" data-action="deg">deg</button>
            <button class="func-btn" data-func="sin">sin</button>
            <button class="func-btn" data-func="cos">cos</button>
            <button class="func-btn" data-func="tan">tan</button>
            <button class="func-btn" data-func="ln">ln</button>

            <button class="func-btn" data-func="log">log</button>
            <button class="func-btn" data-func="√">√</button>
            <button class="func-btn" data-func="x²">x²</button>
            <button class="func-btn" data-func="xʸ">xʸ</button>
            <button class="func-btn" data-const="π">π</button>
            <button class="func-btn" data-const="e">e</button>

            <button data-input="7">7</button>
            <button data-input="8">8</button>
            <button data-input="9">9</button>
            <button class="operator-btn" data-op="/">÷</button>
            <button class="func-btn" data-func="(">(</button>
            <button class="func-btn" data-func=")">)</button>

            <button data-input="4">4</button>
            <button data-input="5">5</button>
            <button data-input="6">6</button>
            <button class="operator-btn" data-op="*">×</button>
            <button class="func-btn" data-func="abs">|x|</button>
            <button class="func-btn" data-func="floor">floor</button>

            <button data-input="1">1</button>
            <button data-input="2">2</button>
            <button data-input="3">3</button>
            <button class="operator-btn" data-op="-">-</button>
            <button class="func-btn" data-func="ceil">ceil</button>
            <button class="func-btn" data-func="%">%</button>

            <button data-input="0">0</button>
            <button data-input=".">.</button>
            <button class="clear-btn" data-action="clear">C</button>
            <button class="operator-btn" data-op="+">+</button>
            <button class="func-btn" data-func="exp">eˣ</button>
            <button class="func-btn" data-func="x³">x³</button>

            <button class="func-btn" data-func="1/x">1/x</button>
            <button class="func-btn" data-func="!">n!</button>
            <button class="func-btn" data-action="backspace"><i class="fas fa-backspace"></i></button>
            <button class="equal-btn span-2" data-action="equals">=</button>
            <button class="func-btn" data-func="±">+/-</button>
        </div>
        <div class="info-footer">
            <span><i class="fas fa-calculator"></i> TACTICAL PRECISION</span>
            <span><i class="fas fa-waveform"></i> DEFENCE AUDIO ACTIVE</span>
            <span><i class="fas fa-shield-hawk"></i> GOLD | GREEN | BLUE</span>
        </div>
    </div>
</div>

<script>
    // ========== CALCULATOR ENGINE (Full Scientific) ==========
    let currentExpression = "";
    let radianMode = true;
    let lastResult = null;
    const expressionDiv = document.getElementById("expressionPreview");
    const resultDiv = document.getElementById("resultDisplay");

    function updateDisplay() {
        expressionDiv.innerText = currentExpression === "" ? "0" : currentExpression;
    }
    function setResult(value) {
        if (value === undefined || isNaN(value) || !isFinite(value)) {
            resultDiv.innerText = "⚡ERROR";
            return;
        }
        let num = parseFloat(value);
        if (isNaN(num)) { resultDiv.innerText = "ERROR"; return; }
        if (Math.abs(num) > 1e12 || (Math.abs(num) < 1e-12 && num !== 0)) {
            resultDiv.innerText = num.toExponential(10);
        } else {
            let str = num.toString();
            if (str.includes('.') && str.replace(/\.?0+$/, '').length < 15) {
                resultDiv.innerText = parseFloat(num.toFixed(10)).toString();
            } else { resultDiv.innerText = str; }
        }
        lastResult = num;
    }

    function evaluateExpression(expr) {
        let processed = expr.trim();
        if (processed === "") return 0;
        processed = processed.replace(/π/g, 'PI').replace(/e(?![a-z])/g, 'E');
        processed = processed.replace(/(\d+(?:\.\d+)?|\([^()]+\)|π|E)!/g, (match, numStr) => {
            let num = evaluateSimpleNumber(numStr);
            return isNaN(num) ? 'NaN' : factorial(num);
        });
        processed = processed.replace(/(\d+(?:\.\d+)?)%/g, (match, p) => `(${p}/100)`);
        processed = processed.replace(/√\(([^)]+)\)/g, 'sqrt($1)').replace(/√(\d+(?:\.\d+)?)/g, 'sqrt($1)');
        processed = processed.replace(/x²/g, '^2').replace(/x³/g, '^3').replace(/\^/g, '**');
        processed = processed.replace(/1\/x/g, '(1/x)').replace(/\|x\|/g, 'abs(x)');
        processed = processed.replace(/floor\(/g, 'Math.floor(').replace(/ceil\(/g, 'Math.ceil(').replace(/abs\(/g, 'Math.abs(');
        processed = processed.replace(/ln\(/g, 'Math.log(').replace(/log\(/g, 'log10(').replace(/exp\(/g, 'Math.exp(');
        processed = processed.replace(/sin\(/g, 'sinFunc(').replace(/cos\(/g, 'cosFunc(').replace(/tan\(/g, 'tanFunc(').replace(/sqrt\(/g, 'Math.sqrt(');
        
        function sinFunc(x) { let val = radianMode ? x : x * Math.PI/180; return Math.sin(val); }
        function cosFunc(x) { let val = radianMode ? x : x * Math.PI/180; return Math.cos(val); }
        function tanFunc(x) { let val = radianMode ? x : x * Math.PI/180; return Math.tan(val); }
        function log10(x) { return Math.log10(x); }
        function factorial(n) { if (n < 0 || Math.floor(n) !== n) return NaN; if (n > 170) return Infinity; let f=1; for(let i=2;i<=n;i++) f*=i; return f; }
        function evaluateSimpleNumber(strExpr) { try { const fn = new Function('return (' + strExpr + ')'); return fn(); } catch(e){ return NaN; } }
        try {
            const evaluator = new Function('sinFunc','cosFunc','tanFunc','log10','factorial','Math', `"use strict"; return (${processed});`);
            let res = evaluator(sinFunc, cosFunc, tanFunc, log10, factorial, Math);
            if (isNaN(res) || !isFinite(res)) throw new Error();
            return res;
        } catch(err) { return NaN; }
    }
    function computeFactorial(num) { if (num < 0 || Math.floor(num) !== num) return NaN; if (num>170) return Infinity; let f=1; for(let i=2;i<=num;i++) f*=i; return f; }
    function applyUnaryFunction(funcName) {
        let currentValue = currentExpression.trim() === "" ? (lastResult !== null ? lastResult : 0) : evaluateExpression(currentExpression);
        if (isNaN(currentValue)) { setResult(NaN); return; }
        let computed;
        switch(funcName){
            case 'sin': computed = radianMode ? Math.sin(currentValue) : Math.sin(currentValue*Math.PI/180); break;
            case 'cos': computed = radianMode ? Math.cos(currentValue) : Math.cos(currentValue*Math.PI/180); break;
            case 'tan': computed = radianMode ? Math.tan(currentValue) : Math.tan(currentValue*Math.PI/180); break;
            case 'ln': computed = Math.log(currentValue); break;
            case 'log': computed = Math.log10(currentValue); break;
            case '√': computed = Math.sqrt(currentValue); break;
            case 'x²': computed = currentValue**2; break;
            case 'x³': computed = currentValue**3; break;
            case 'exp': computed = Math.exp(currentValue); break;
            case 'abs': computed = Math.abs(currentValue); break;
            case 'floor': computed = Math.floor(currentValue); break;
            case 'ceil': computed = Math.ceil(currentValue); break;
            case '1/x': computed = 1/currentValue; break;
            case '!': computed = computeFactorial(Math.floor(currentValue)); break;
            case '±': computed = -currentValue; break;
            default: return;
        }
        if (isNaN(computed) || !isFinite(computed)) { setResult(NaN); resultDiv.innerText = "MATH ERROR"; currentExpression=""; updateDisplay(); return; }
        setResult(computed);
        currentExpression = computed.toString();
        updateDisplay();
        lastResult = computed;
    }
    function handlePower() {
        let baseVal = currentExpression.trim() === "" ? (lastResult !== null ? lastResult : 0) : evaluateExpression(currentExpression);
        if (isNaN(baseVal)) { setResult(NaN); return; }
        let exponent = prompt("ENTER EXPONENT (y):", "2");
        if(exponent===null) return;
        let expNum = parseFloat(exponent);
        if(isNaN(expNum)) return;
        let result = Math.pow(baseVal, expNum);
        setResult(result);
        currentExpression = result.toString();
        updateDisplay();
        lastResult = result;
    }
    function handleButtonClick(value, type, action, func, op, constVal){
        if(action==='clear'){ currentExpression=""; lastResult=null; setResult(0); updateDisplay(); resultDiv.innerText="0"; return; }
        if(action==='equals'){
            if(currentExpression===""){ if(lastResult!==null) setResult(lastResult); return; }
            let evalResult = evaluateExpression(currentExpression);
            if(isNaN(evalResult) || !isFinite(evalResult)){ setResult(NaN); resultDiv.innerText="INVALID"; currentExpression=""; updateDisplay(); return; }
            setResult(evalResult); currentExpression = evalResult.toString(); updateDisplay(); lastResult = evalResult; return;
        }
        if(action==='backspace'){ currentExpression = currentExpression.slice(0,-1); updateDisplay(); if(currentExpression==="") setResult(0); else { let prev = evaluateExpression(currentExpression); if(!isNaN(prev) && isFinite(prev)) setResult(prev); else resultDiv.innerText="?"; } return; }
        if(func){ if(func==='xʸ'){ handlePower(); return; } applyUnaryFunction(func); return; }
        if(op){ currentExpression += op; updateDisplay(); return; }
        if(constVal){ currentExpression += constVal; updateDisplay(); return; }
        if(type==='input'){ currentExpression += value; updateDisplay(); return; }
        if(type==='rad'){ radianMode=true; resultDiv.innerText = lastResult!==null?lastResult:"0"; return; }
        if(type==='deg'){ radianMode=false; resultDiv.innerText = lastResult!==null?lastResult:"0"; return; }
    }
    const btns = document.querySelectorAll('#calcGrid button');
    btns.forEach(btn => {
        btn.addEventListener('click',(e)=>{
            e.preventDefault();
            const inputVal=btn.getAttribute('data-input'), opVal=btn.getAttribute('data-op'), actionVal=btn.getAttribute('data-action'), funcVal=btn.getAttribute('data-func'), constVal=btn.getAttribute('data-const');
            if(inputVal!==null) handleButtonClick(inputVal,'input',null,null,null,null);
            else if(opVal!==null) handleButtonClick(null,null,null,null,opVal,null);
            else if(actionVal!==null) handleButtonClick(null,null,actionVal,null,null,null);
            else if(funcVal!==null) handleButtonClick(null,null,null,funcVal,null,null);
            else if(constVal!==null) handleButtonClick(null,null,null,null,null,constVal);
            else if(btn.getAttribute('data-action')==='rad'){ radianMode=true; resultDiv.innerText=lastResult!==null?lastResult:"0"; }
            else if(btn.getAttribute('data-action')==='deg'){ radianMode=false; resultDiv.innerText=lastResult!==null?lastResult:"0"; }
        });
    });
    setResult(0); currentExpression=""; updateDisplay();

    // ========== TECH AUDIO (Ambient defence synth + background sound) ==========
    let audioCtx = null;
    let isAudioPlaying = false;
    let oscillator = null;
    let gainNode = null;
    let animationId = null;

    const toggleBtn = document.getElementById('toggleAudioBtn');
    const audioStatusSpan = document.getElementById('audioStatusText');
    const waveSpans = document.querySelectorAll('#waveBars span');

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.15;
        gainNode.connect(audioCtx.destination);
    }

    function startTechAudio() {
        if (!audioCtx) initAudio();
        if (oscillator) {
            try { oscillator.stop(); oscillator.disconnect(); } catch(e) {}
        }
        oscillator = audioCtx.createOscillator();
        oscillator.type = 'sine';
        oscillator.frequency.value = 96; // deep bass drone
        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.frequency.value = 2.4;
        lfoGain.gain.value = 18;
        lfo.connect(lfoGain);
        lfoGain.connect(oscillator.frequency);
        oscillator.connect(gainNode);
        oscillator.start();
        lfo.start();
        // add second harmonic for tech texture
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'triangle';
        osc2.frequency.value = 187;
        const gain2 = audioCtx.createGain();
        gain2.gain.value = 0.08;
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.start();
        
        // store for stop
        oscillator.userData = { lfo, osc2, gain2 };
        gainNode.gain.setTargetAtTime(0.22, audioCtx.currentTime, 0.05);
        isAudioPlaying = true;
        audioStatusSpan.innerText = "TECH ACTIVE";
        toggleBtn.innerHTML = '<i class="fas fa-stop"></i>';
        // animate waves stronger
        waveSpans.forEach(span => span.style.animationDuration = "0.4s");
    }

    function stopTechAudio() {
        if (oscillator) {
            try {
                oscillator.stop();
                oscillator.disconnect();
                if (oscillator.userData && oscillator.userData.lfo) {
                    oscillator.userData.lfo.stop();
                    oscillator.userData.lfo.disconnect();
                    oscillator.userData.osc2.stop();
                    oscillator.userData.osc2.disconnect();
                }
            } catch(e) {}
            oscillator = null;
        }
        if (audioCtx) {
            // optional: suspend but not close
        }
        isAudioPlaying = false;
        audioStatusSpan.innerText = "TECH AUDIO OFF";
        toggleBtn.innerHTML = '<i class="fas fa-play"></i>';
        waveSpans.forEach(span => span.style.animationDuration = "0.8s");
    }

    toggleBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!audioCtx) {
            initAudio();
            await audioCtx.resume();
        }
        if (isAudioPlaying) {
            stopTechAudio();
            if (audioCtx) audioCtx.suspend();
        } else {
            await audioCtx.resume();
            startTechAudio();
        }
    });

    // optional: start suspended, user interaction first click anywhere to enable audio context
    document.body.addEventListener('click', () => {
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }, { once: true });

    // visual wave animation sync (already css)
</script>
</body>
</html>
