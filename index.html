<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>INNOCENT TECH • CALCULATOR | Scientific + AI Voice</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, sans-serif;
            position: relative;
            background: #03050c;
        }

        /* ========= REALISTIC LIGHTNING + THUNDERSTORM BACKGROUND ========= */
        .storm-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(145deg, #0a0f1a 0%, #020408 100%);
        }

        /* Dark storm clouds layer */
        .storm-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(ellipse at 30% 40%, rgba(30,40,60,0.6) 0%, rgba(0,0,0,0.9) 80%);
            animation: cloudDrift 30s infinite linear;
            z-index: 0;
        }

        /* Rain particles (realistic) */
        .rain {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }
        .rain i {
            position: absolute;
            background: rgba(180, 210, 255, 0.6);
            width: 2px;
            height: 12px;
            border-radius: 2px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-20vh) rotate(5deg); opacity: 0.7; }
            100% { transform: translateY(100vh) rotate(5deg); opacity: 0; }
        }

        /* Lightning flashes (realistic) */
        .lightning-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 250, 210, 0);
            pointer-events: none;
            z-index: 15;
            transition: background 0.04s ease;
        }
        .lightning-active {
            background: rgba(255, 245, 200, 0.85) !important;
            box-shadow: 0 0 100px rgba(255, 240, 150, 0.6);
        }

        /* thunder rumble effect (visual vibration) */
        @keyframes thunderShake {
            0% { transform: translateX(0px); }
            25% { transform: translateX(3px); }
            75% { transform: translateX(-3px); }
            100% { transform: translateX(0px); }
        }
        .thunder-shake {
            animation: thunderShake 0.12s ease-in-out 2;
        }

        /* ===== TOP BAR ===== */
        .top-defence-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: rgba(3, 6, 14, 0.75);
            backdrop-filter: blur(14px);
            border-bottom: 2px solid #ffcc44;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Instagram Support Link */
        .instagram-link {
            background: linear-gradient(135deg, #833AB4, #E4405F, #F56040);
            padding: 8px 22px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(228, 64, 95, 0.5);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .instagram-link:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(228, 64, 95, 0.8);
        }

        .rotating-globe {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 20px;
            border-radius: 60px;
            border: 1px solid #ffcc44;
        }
        .globe-spin {
            animation: spinSlow 5s infinite linear;
            font-size: 1.6rem;
            color: #ffcc44;
        }
        @keyframes spinSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .innocent-badge {
            font-weight: 800;
            font-size: 1rem;
            background: linear-gradient(135deg, #ffdd99, #ffcc44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* CALCULATOR CARD */
        .calc-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 1.2rem 1.2rem 1.2rem;
            z-index: 30;
        }
        .calculator-card {
            width: 100%;
            max-width: 820px;
            background: rgba(5, 10, 22, 0.85);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 204, 68, 0.7);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 204, 68, 0.3);
            transition: all 0.2s;
        }

        .display-area {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #ffcc44;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 4px 12px rgba(255,204,68,0.2);
        }
        .expression {
            font-size: 1rem;
            color: #bbd4ff;
            min-height: 2rem;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        .result {
            font-size: 2.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffe6b3, #ffcc44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: right;
            font-family: 'Courier New', monospace;
        }
        .scientific-badge {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.7rem;
            color: #ffdd99;
            border-top: 1px dashed rgba(255, 204, 68, 0.5);
            padding-top: 8px;
        }

        /* BUTTON GRID */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }
        button {
            background: rgba(16, 26, 46, 0.9);
            border: none;
            padding: 1rem 0;
            border-radius: 1.2rem;
            font-size: 1rem;
            font-weight: 700;
            color: #f0f3ff;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            border-bottom: 3px solid #3cb371;
            font-family: 'Inter', monospace;
        }
        button:hover {
            transform: translateY(-3px);
            background: rgba(255, 204, 68, 0.3);
            border-bottom-color: #ffcc44;
            box-shadow: 0 6px 14px rgba(255, 204, 68, 0.3);
        }
        .operator-btn {
            background: rgba(46, 139, 87, 0.45);
            color: #fff0c0;
            border-bottom-color: #ffcc44;
        }
        .equal-btn {
            background: linear-gradient(135deg, #ffcc44, #d99e1a);
            color: #0a0c1a;
            font-weight: 900;
            border-bottom: 3px solid #ffdd99;
            box-shadow: 0 0 12px rgba(255, 204, 68, 0.6);
        }
        .clear-btn {
            background: rgba(180, 70, 50, 0.85);
            border-bottom-color: #ffaa66;
        }
        .func-btn {
            background: rgba(30, 64, 125, 0.8);
            border-bottom-color: #3b82f6;
        }
        .span-2 {
            grid-column: span 2;
        }
        @media (max-width: 620px) {
            .calculator-card { padding: 1rem; }
            .buttons-grid { gap: 8px; }
            button { padding: 0.7rem 0; font-size: 0.8rem; }
            .result { font-size: 2rem; }
        }
        .info-footer {
            margin-top: 1.2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #8aa3cc;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            border-top: 1px solid rgba(255, 204, 68, 0.3);
            padding-top: 12px;
        }
        /* beautiful lady avatar + voice */
        .voice-assistant {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 200;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 0 12px rgba(0,0,0,0.5));
            transition: 0.2s;
        }
        .avatar-lady {
            background: linear-gradient(145deg, #ffd1b3, #f5bc8e);
            border-radius: 100px;
            padding: 8px 14px 6px 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), 0 0 0 3px #ffcc44;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .avatar-lady i {
            font-size: 2.5rem;
            color: #4a2a1a;
            text-shadow: 0 1px 2px white;
        }
        .voice-text {
            background: #1e2a3a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            margin-top: 6px;
            color: #ffdd99;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid #ffcc44;
        }
        .voice-assistant:hover {
            transform: scale(1.02);
        }
        @keyframes soundWave {
            0% { text-shadow: 0 0 0 #ffcc44; }
            100% { text-shadow: 0 0 8px #ffaa33; }
        }
        .speaking {
            animation: soundWave 0.5s infinite alternate;
        }
    </style>
</head>
<body>

<!-- REALISTIC STORM + LIGHTNING BACKGROUND -->
<div class="storm-background" id="stormBg">
    <div class="rain" id="rainContainer"></div>
    <div class="lightning-flash" id="lightningFlash"></div>
</div>

<!-- TOP BAR -->
<div class="top-defence-bar">
    <a href="https://www.instagram.com/sam_ster9?igsh=MTFuNHB0eGFzbmVjNg==" class="instagram-link" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-instagram" style="font-size: 1.4rem;"></i>
        <span>INSTAGRAM SUPPORT</span>
        <i class="fas fa-headset"></i>
    </a>
    <div class="rotating-globe">
        <i class="fas fa-bolt globe-spin" style="color: #ffcc44;"></i>
        <span class="innocent-badge">⚡ INNOCENT TECH ⚡</span>
    </div>
</div>

<!-- CALCULATOR -->
<div class="calc-container">
    <div class="calculator-card">
        <div class="display-area">
            <div class="expression" id="expressionPreview">0</div>
            <div class="result" id="resultDisplay">0</div>
            <div class="scientific-badge">
                <span><i class="fas fa-thunderstorm"></i> STORM SCIENTIFIC | rad/deg</span>
                <span><i class="fas fa-chart-line"></i> π, e, ln, log, xʸ</span>
            </div>
        </div>
        <div class="buttons-grid" id="calcGrid">
            <button class="func-btn" data-action="rad">rad</button>
            <button class="func-btn" data-action="deg">deg</button>
            <button class="func-btn" data-func="sin">sin</button>
            <button class="func-btn" data-func="cos">cos</button>
            <button class="func-btn" data-func="tan">tan</button>
            <button class="func-btn" data-func="ln">ln</button>
            <button class="func-btn" data-func="log">log</button>
            <button class="func-btn" data-func="√">√</button>
            <button class="func-btn" data-func="x²">x²</button>
            <button class="func-btn" data-func="xʸ">xʸ</button>
            <button class="func-btn" data-const="π">π</button>
            <button class="func-btn" data-const="e">e</button>
            <button data-input="7">7</button><button data-input="8">8</button><button data-input="9">9</button>
            <button class="operator-btn" data-op="/">÷</button>
            <button class="func-btn" data-func="(">(</button><button class="func-btn" data-func=")">)</button>
            <button data-input="4">4</button><button data-input="5">5</button><button data-input="6">6</button>
            <button class="operator-btn" data-op="*">×</button>
            <button class="func-btn" data-func="abs">|x|</button><button class="func-btn" data-func="floor">floor</button>
            <button data-input="1">1</button><button data-input="2">2</button><button data-input="3">3</button>
            <button class="operator-btn" data-op="-">-</button>
            <button class="func-btn" data-func="ceil">ceil</button><button class="func-btn" data-func="%">%</button>
            <button data-input="0">0</button><button data-input=".">.</button>
            <button class="clear-btn" data-action="clear">C</button>
            <button class="operator-btn" data-op="+">+</button>
            <button class="func-btn" data-func="exp">eˣ</button>
            <button class="func-btn" data-func="x³">x³</button>
            <button class="func-btn" data-func="1/x">1/x</button>
            <button class="func-btn" data-func="!">n!</button>
            <button class="func-btn" data-action="backspace"><i class="fas fa-backspace"></i></button>
            <button class="equal-btn span-2" data-action="equals">=</button>
            <button class="func-btn" data-func="±">+/-</button>
        </div>
        <div class="info-footer">
            <span><i class="fas fa-calculator"></i> TACTICAL PRECISION</span>
            <span><i class="fas fa-cloud-rain"></i> STORM MODE ACTIVE</span>
            <span><i class="fab fa-instagram"></i> @sam_ster9</span>
        </div>
    </div>
</div>

<!-- BEAUTIFUL LADY ASSISTANT (VOICE) -->
<div class="voice-assistant" id="voiceAvatar">
    <div class="avatar-lady">
        <i class="fas fa-female"></i> <i class="fas fa-microphone-alt"></i>
    </div>
    <div class="voice-text">✨ TAP FOR HELP ✨</div>
</div>

<script>
    // ========= LIGHTNING & THUNDER REALISTIC ENGINE ==========
    const lightningDiv = document.getElementById('lightningFlash');
    function triggerLightning() {
        lightningDiv.classList.add('lightning-active');
        document.body.classList.add('thunder-shake');
        // thunder sound (low frequency rumble using web audio)
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.frequency.value = 80;
            oscillator.type = 'sine';
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1.2);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1.0);
        } catch(e) { console.log("audio context blocked"); }
        setTimeout(() => {
            lightningDiv.classList.remove('lightning-active');
            document.body.classList.remove('thunder-shake');
        }, 120);
    }
    // random lightning intervals (realistic)
    function randomLightning() {
        const delay = Math.random() * 8000 + 3000; // 3 to 11 seconds
        setTimeout(() => {
            triggerLightning();
            randomLightning();
        }, delay);
    }
    randomLightning();

    // RAIN PARTICLES
    const rainContainer = document.getElementById('rainContainer');
    for (let i = 0; i < 180; i++) {
        const drop = document.createElement('i');
        const left = Math.random() * 100;
        const duration = Math.random() * 1.2 + 0.6;
        const delay = Math.random() * 8;
        drop.style.left = left + '%';
        drop.style.animationDuration = duration + 's';
        drop.style.animationDelay = delay + 's';
        drop.style.height = Math.random() * 12 + 6 + 'px';
        drop.style.width = '2px';
        drop.style.opacity = Math.random() * 0.5 + 0.2;
        rainContainer.appendChild(drop);
    }

    // ========= CALCULATOR ENGINE (SCIENTIFIC) ==========
    let currentExpression = "";
    let radianMode = true;
    let lastResult = null;
    const expressionDiv = document.getElementById("expressionPreview");
    const resultDiv = document.getElementById("resultDisplay");

    function updateDisplay() { expressionDiv.innerText = currentExpression === "" ? "0" : currentExpression; }
    function setResult(value) {
        if (value === undefined || isNaN(value) || !isFinite(value)) { resultDiv.innerText = "⚡ STORM ERROR"; return; }
        let num = parseFloat(value);
        if (isNaN(num)) { resultDiv.innerText = "INVALID"; return; }
        if (Math.abs(num) > 1e12 || (Math.abs(num) < 1e-12 && num !== 0)) resultDiv.innerText = num.toExponential(10);
        else { let str = num.toString(); if (str.includes('.') && str.replace(/\.?0+$/, '').length < 15) resultDiv.innerText = parseFloat(num.toFixed(10)).toString(); else resultDiv.innerText = str; }
        lastResult = num;
    }
    function evaluateExpression(expr) {
        let processed = expr.trim(); if (processed === "") return 0;
        processed = processed.replace(/π/g, 'PI').replace(/e(?![a-z])/g, 'E');
        processed = processed.replace(/(\d+(?:\.\d+)?|\([^()]+\)|π|E)!/g, (m, numStr) => { let n = evalSimple(numStr); return isNaN(n) ? 'NaN' : factorial(n); });
        processed = processed.replace(/(\d+(?:\.\d+)?)%/g, (m,p) => `(${p}/100)`);
        processed = processed.replace(/√\(([^)]+)\)/g, 'sqrt($1)').replace(/√(\d+(?:\.\d+)?)/g, 'sqrt($1)');
        processed = processed.replace(/x²/g, '^2').replace(/x³/g, '^3').replace(/\^/g, '**');
        processed = processed.replace(/1\/x/g, '(1/x)').replace(/\|x\|/g, 'abs(x)');
        processed = processed.replace(/floor\(/g, 'Math.floor(').replace(/ceil\(/g, 'Math.ceil(').replace(/abs\(/g, 'Math.abs(');
        processed = processed.replace(/ln\(/g, 'Math.log(').replace(/log\(/g, 'log10(').replace(/exp\(/g, 'Math.exp(');
        processed = processed.replace(/sin\(/g, 'sinFunc(').replace(/cos\(/g, 'cosFunc(').replace(/tan\(/g, 'tanFunc(').replace(/sqrt\(/g, 'Math.sqrt(');
        function sinFunc(x) { let val = radianMode ? x : x * Math.PI/180; return Math.sin(val); }
        function cosFunc(x) { let val = radianMode ? x : x * Math.PI/180; return Math.cos(val); }
        function tanFunc(x) { let val = radianMode ? x : x * Math.PI/180; return Math.tan(val); }
        function log10(x) { return Math.log10(x); }
        function factorial(n) { if (n < 0 || Math.floor(n) !== n) return NaN; if (n > 170) return Infinity; let f=1; for(let i=2;i<=n;i++) f*=i; return f; }
        function evalSimple(strExpr) { try { const fn = new Function('return (' + strExpr + ')'); return fn(); } catch(e){ return NaN; } }
        try { const evaluator = new Function('sinFunc','cosFunc','tanFunc','log10','factorial','Math', `"use strict"; return (${processed});`); let res = evaluator(sinFunc, cosFunc, tanFunc, log10, factorial, Math); if (isNaN(res) || !isFinite(res)) throw new Error(); return res; } catch(err) { return NaN; }
    }
    function computeFactorial(num) { if (num < 0 || Math.floor(num) !== num) return NaN; if (num>170) return Infinity; let f=1; for(let i=2;i<=num;i++) f*=i; return f; }
    function applyUnaryFunction(funcName) {
        let currentValue = currentExpression.trim() === "" ? (lastResult !== null ? lastResult : 0) : evaluateExpression(currentExpression);
        if (isNaN(currentValue)) { setResult(NaN); return; }
        let computed;
        switch(funcName){
            case 'sin': computed = radianMode ? Math.sin(currentValue) : Math.sin(currentValue*Math.PI/180); break;
            case 'cos': computed = radianMode ? Math.cos(currentValue) : Math.cos(currentValue*Math.PI/180); break;
            case 'tan': computed = radianMode ? Math.tan(currentValue) : Math.tan(currentValue*Math.PI/180); break;
            case 'ln': computed = Math.log(currentValue); break;
            case 'log': computed = Math.log10(currentValue); break;
            case '√': computed = Math.sqrt(currentValue); break;
            case 'x²': computed = currentValue**2; break;
            case 'x³': computed = currentValue**3; break;
            case 'exp': computed = Math.exp(currentValue); break;
            case 'abs': computed = Math.abs(currentValue); break;
            case 'floor': computed = Math.floor(currentValue); break;
            case 'ceil': computed = Math.ceil(currentValue); break;
            case '1/x': computed = 1/currentValue; break;
            case '!': computed = computeFactorial(Math.floor(currentValue)); break;
            case '±': computed = -currentValue; break;
            default: return;
        }
        if (isNaN(computed) || !isFinite(computed)) { setResult(NaN); resultDiv.innerText = "⚡ ERROR"; currentExpression=""; updateDisplay(); return; }
        setResult(computed); currentExpression = computed.toString(); updateDisplay(); lastResult = computed;
    }
    function handlePower() {
        let baseVal = currentExpression.trim() === "" ? (lastResult !== null ? lastResult : 0) : evaluateExpression(currentExpression);
        if (isNaN(baseVal)) { setResult(NaN); return; }
        let exponent = prompt("🔢 ENTER EXPONENT (y):", "2"); if(exponent===null) return;
        let expNum = parseFloat(exponent); if(isNaN(expNum)) return;
        let result = Math.pow(baseVal, expNum); setResult(result); currentExpression = result.toString(); updateDisplay(); lastResult = result;
    }
    function handleButtonClick(value, type, action, func, op, constVal){
        if(action==='clear'){ currentExpression=""; lastResult=null; setResult(0); updateDisplay(); resultDiv.innerText="0"; return; }
        if(action==='equals'){ if(currentExpression===""){ if(lastResult!==null) setResult(lastResult); return; } let evalResult = evaluateExpression(currentExpression); if(isNaN(evalResult) || !isFinite(evalResult)){ setResult(NaN); resultDiv.innerText="❌ STORM FAIL"; currentExpression=""; updateDisplay(); return; } setResult(evalResult); currentExpression = evalResult.toString(); updateDisplay(); lastResult = evalResult; return; }
        if(action==='backspace'){ currentExpression = currentExpression.slice(0,-1); updateDisplay(); if(currentExpression==="") setResult(0); else { let prev = evaluateExpression(currentExpression); if(!isNaN(prev) && isFinite(prev)) setResult(prev); else resultDiv.innerText="?"; } return; }
        if(func){ if(func==='xʸ'){ handlePower(); return; } applyUnaryFunction(func); return; }
        if(op){ currentExpression += op; updateDisplay(); return; }
        if(constVal){ currentExpression += constVal; updateDisplay(); return; }
        if(type==='input'){ currentExpression += value; updateDisplay(); return; }
        if(type==='rad'){ radianMode=true; resultDiv.innerText = lastResult!==null?lastResult:"0"; return; }
        if(type==='deg'){ radianMode=false; resultDiv.innerText = lastResult!==null?lastResult:"0"; return; }
    }
    const btns = document.querySelectorAll('#calcGrid button');
    btns.forEach(btn => { btn.addEventListener('click',(e)=>{ e.preventDefault(); const inputVal=btn.getAttribute('data-input'), opVal=btn.getAttribute('data-op'), actionVal=btn.getAttribute('data-action'), funcVal=btn.getAttribute('data-func'), constVal=btn.getAttribute('data-const'); if(inputVal!==null) handleButtonClick(inputVal,'input',null,null,null,null); else if(opVal!==null) handleButtonClick(null,null,null,null,opVal,null); else if(actionVal!==null) handleButtonClick(null,null,actionVal,null,null,null); else if(funcVal!==null) handleButtonClick(null,null,null,funcVal,null,null); else if(constVal!==null) handleButtonClick(null,null,null,null,null,constVal); else if(btn.getAttribute('data-action')==='rad'){ radianMode=true; resultDiv.innerText=lastResult!==null?lastResult:"0"; } else if(btn.getAttribute('data-action')==='deg'){ radianMode=false; resultDiv.innerText=lastResult!==null?lastResult:"0"; } }); });
    setResult(0); currentExpression=""; updateDisplay();

    // ========= BEAUTIFUL LADY VOICE ASSISTANT (speaks on click) ==========
    const voiceAvatar = document.getElementById('voiceAvatar');
    let synth = window.speechSynthesis;
    let speakingNow = false;
    function speakHelp(text, isWelcome = false) {
        if (synth.speaking) synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.92;
        utterance.pitch = 1.15;
        // select female voice
        const voices = synth.getVoices();
        const femaleVoice = voices.find(v => v.name.includes('Google UK English Female') || v.name.includes('Samantha') || v.name.includes('Victoria') || v.name.includes('Karen'));
        if (femaleVoice) utterance.voice = femaleVoice;
        utterance.onstart = () => { document.querySelector('.avatar-lady i').classList.add('speaking'); };
        utterance.onend = () => { document.querySelector('.avatar-lady i').classList.remove('speaking'); };
        synth.speak(utterance);
    }
    // first interaction: welcome message + storm calculator intro
    let greeted = false;
    function welcomeMessage() {
        if (!greeted) {
            speakHelp("Welcome to Innocent Tech Storm Calculator. I am your virtual assistant. For support, visit Instagram link above. Lightning mode active. Use scientific functions with precision.", true);
            greeted = true;
        }
    }
    voiceAvatar.addEventListener('click', () => {
        speakHelp("Hello! I'm your Storm Assistant. Need help? Contact support on Instagram: sam underscore ster 9. Use trigonometry, power functions, and enjoy the thunderstorm calculator.");
        welcomeMessage(); // ensure greeting also
    });
    // first click anywhere on calculator triggers greeting as well
    document.querySelector('.calculator-card').addEventListener('click', () => { welcomeMessage(); }, { once: true });
    // preload voices and welcome after 1s just for vibe
    setTimeout(() => { if (!greeted) welcomeMessage(); }, 1800);
</script>
